<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Now!</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-bar">
        <div class="brand">
          <h1>น้องฟ้าใส <span style="font-size: 18px;">(Virtual Order Taker)</span></h1>
          <span id="status" class="status">Idle</span>
        </div>
        <div class="btn-group">
          <button id="historyButton" class="ghost-btn" type="button">
            <span class="fa-solid fa-message"></span><span style="margin-left: 10px;">View Chat</span>
          </button>
          <button id="themeToggle" class="ghost-btn" type="button"><span id="themeToggleIcon" class="fa-solid fa-sun"></span></button>
        </div>
      </header>

      <main class="stage">
        <div class="avatar-stage" id="avatarStage">
          <div class="avatar-core">
            <div class="avatar-art" id="avatarMount" aria-hidden="true"></div>
          </div>
        </div>

        <div id="subtitle" class="subtitle"></div>
      </main>

      <footer class="mic-bar">
        <button
          id="micButton"
          class="mic-button"
          type="button"
          aria-pressed="false"
        >
          <span id="micIcon" class="fa-solid fa-microphone" style="font-size: 30px; color: white;"></span>
        </button>
      </footer>
    </div>

    <!-- Chat Log Modal -->
    <div id="chatModal" class="chat-modal" aria-hidden="true">
      <div
        class="chat-surface"
        role="dialog"
        aria-modal="true"
        aria-labelledby="chatModalTitle"
      >
        <header>
          <h2 id="chatModalTitle">Conversation</h2>
          <button id="closeModal" class="ghost-btn" type="button">Close</button>
        </header>
        <div id="chatStream" class="chat-stream"></div>
      </div>
    </div>

    <!-- Pre-Chat Modal -->
    <div id="prechatModal" class="chat-modal open" aria-hidden="false">
      <div
        class="chat-surface"
        role="dialog"
        aria-modal="true"
        aria-labelledby="prechatTitle"
      >
        <header><h2 id="prechatTitle">Start your order</h2></header>
        <div class="chat-stream" style="gap: 14px">
          <label>
            ชื่อลูกค้า (Customer name)
            <input
              id="customerNameInput"
              type="text"
              placeholder="e.g., Bob"
              style="
                width: 100%;
                padding: 10px;
                border-radius: 10px;
                border: 1px solid rgba(116, 138, 255, 0.35);
                background: rgba(255, 255, 255, 0.04);
                color: inherit;
              "
            />
          </label>
          <div>
            ตัวเลือกการสั่ง (Option)
            <div class="order-option-group">
              <button class="order-option-btn active" data-value="dinein">
                🍽️ ทานที่ร้าน
              </button>
              <button class="order-option-btn" data-value="takeaway">
                🛍️ ห่อกลับบ้าน
              </button>
            </div>
          </div>
        </div>
        <div
          style="
            padding: 12px 16px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
          "
        >
          <button id="startSessionBtn" class="ghost-btn" type="button">
            Start
          </button>
        </div>
      </div>
    </div>

    <!-- Final Summary Modal -->
    <div id="finalModal" class="chat-modal" aria-hidden="true">
      <div
        class="chat-surface"
        role="dialog"
        aria-modal="true"
        aria-labelledby="finalTitle"
      >
        <header>
          <h2 id="finalTitle">Order Summary</h2>
          <button id="closeFinalBtn" class="ghost-btn" type="button">
            สั่งซื้อใหม่ (New Order)?
          </button>
        </header>
        <div id="finalContent" class="chat-stream"></div>
      </div>
    </div>

    <script type="module" src="./client.js"></script>
  </body>
</html>
